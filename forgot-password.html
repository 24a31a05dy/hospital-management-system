<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password | Hospital Management System</title>

    <!-- CSS Files -->
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/auth.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">

            <h2 class="text-center">Hospital Management System</h2>
            <h3 class="text-center">Forgot Password</h3>

            <form id="forgotForm">

                <!-- Email -->
                <div class="form-group">
                    <label for="forgotEmail">Enter your registered email</label>
                    <input type="email" id="forgotEmail" placeholder="Enter your email">
                </div>

                <!-- Reset Button -->
                <button type="submit" class="btn btn-primary">
                    Reset Password
                </button>

                <!-- Message -->
                <p class="text-center mt-2" id="forgotMessage"></p>

                <!-- Back to Login -->
                <p class="text-center">
                    <a href="login.html">Back to Login</a>
                </p>

            </form>

        </div>
    </div>

    <!-- JS File -->
    <script src="assets/js/auth.js"></script>

</body>
</html>

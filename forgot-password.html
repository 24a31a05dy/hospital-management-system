<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Forgot Password - HarmonyCare Hospital</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2>Reset Password</h2>
            <h3>We’ll help you access your account</h3>

            <form id="forgotForm">
                <div class="form-group">
                    <label for="forgotEmail">Registered Email</label>
                    <input type="email" id="forgotEmail" placeholder="you@example.com" required>
                </div>
                <p class="success" id="forgotMessage"></p>
                <button type="submit">Send Reset Link</button>
            </form>

            <p style="margin-top: 16px; text-align: center;">
                <a href="login.html">Back to login</a>
            </p>
        </div>
    </div>

    <script src="assets/js/utils.js"></script>
    <script src="assets/js/auth.js"></script>
</body>

</html>
